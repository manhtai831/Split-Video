{{define "content"}}
<link href="{{asset "css/auth.css"}}" rel="stylesheet" />
<div class="container auth-page">
  <div class="page-header">
    <h1>Quên mật khẩu</h1>
    <p class="page-description">Nhập email đã đăng ký. Hệ thống sẽ tạo mật khẩu mới và gửi về hộp thư của bạn.</p>
  </div>

  {{if .FlashError}}<div class="auth-alert auth-alert--error" role="alert">{{.FlashError}}</div>{{end}}
  {{if .FlashSuccess}}<div class="auth-alert auth-alert--success" role="status">{{.FlashSuccess}}</div>{{end}}

  <form class="auth-form" method="post" action="/forgot-password" autocomplete="on">
    <div class="form-field">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required autocomplete="email" placeholder="you@example.com" />
    </div>
    <button type="submit">Gửi mật khẩu mới</button>
  </form>

  <p class="auth-links">
    <a href="/login">Quay lại đăng nhập</a>
  </p>
</div>
{{end}}
