{{define "content"}}
<link href="{{asset "css/auth.css"}}" rel="stylesheet" />
<div class="container auth-page">
  <div class="page-header">
    <h1>Đăng nhập</h1>
    <p class="page-description">Đăng nhập để theo dõi job trên nhiều thiết bị. Bạn vẫn có thể dùng tool mà không cần tài khoản.</p>
  </div>

  {{if .FlashError}}<div class="auth-alert auth-alert--error" role="alert">{{.FlashError}}</div>{{end}}
  {{if .FlashSuccess}}<div class="auth-alert auth-alert--success" role="status">{{.FlashSuccess}}</div>{{end}}

  <form class="auth-form" method="post" action="/login" autocomplete="on">
    <div class="form-field">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required autocomplete="email" placeholder="you@example.com" />
    </div>
    <div class="form-field">
      <label for="password">Mật khẩu</label>
      <div class="password-field">
        <input type="password" id="password" name="password" required autocomplete="current-password" minlength="8" />
        {{template "password_toggle" .}}
      </div>
    </div>
    <button type="submit">Đăng nhập</button>
  </form>

  <p class="auth-links">
    <a href="/forgot-password">Quên mật khẩu?</a>
    <span aria-hidden="true">·</span>
    <a href="/register">Đăng ký tài khoản</a>
  </p>
</div>
<script src="{{asset "js/auth-password-toggle.js"}}"></script>
{{end}}
