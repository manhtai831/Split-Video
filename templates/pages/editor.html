{{define "content"}}
<link href="{{asset "css/jobs-ui.css"}}" rel="stylesheet" />
<link href="{{asset "css/editor.css"}}" rel="stylesheet" />
<div class="editor-overlay" id="editorOverlayRoot">
  <header class="editor-overlay__header">
    <div class="editor-overlay__brand">
      <a href="/" class="editor-overlay__back" title="Thoát editor">←</a>
      <h1 class="editor-overlay__title">Video Editor <span lang="en">/ Mock UI</span></h1>
    </div>
    <div id="editorFrameMeta" class="editor-overlay__meta"></div>
  </header>

  <div id="editorWorkspace" class="editor-workspace">
    <div class="editor-toolbar">
      <nav class="editor-menubar" aria-label="Editor menu">
        <div class="editor-menu">
          <button type="button" class="editor-menu__trigger" aria-haspopup="true" aria-expanded="false">File</button>
          <div class="editor-menu__dropdown" hidden>
            <button type="button" id="editorExport" class="editor-menu__item">Export JSON</button>
          </div>
        </div>
        <div class="editor-menu">
          <button type="button" class="editor-menu__trigger" aria-haspopup="true" aria-expanded="false">Insert</button>
          <div class="editor-menu__dropdown" hidden>
            <button type="button" id="editorInsertFile" class="editor-menu__item">File</button>
            <button type="button" id="editorAddText" class="editor-menu__item">Text</button>
            <button type="button" id="editorInsertBlur" class="editor-menu__item" data-tool="blur">Blur</button>
            <div class="editor-menu__submenu-wrap">
              <button type="button" class="editor-menu__item editor-menu__item--submenu" aria-haspopup="true">
                Shape
                <span class="editor-menu__arrow" aria-hidden="true">›</span>
              </button>
              <div class="editor-menu__submenu" hidden>
                <button type="button" id="editorBrushTool" class="editor-menu__item" data-tool="brush">Brush</button>
                <button type="button" class="editor-menu__item" data-shape="rect">Hình chữ nhật</button>
                <button type="button" class="editor-menu__item" data-shape="circle">Tròn</button>
                <button type="button" class="editor-menu__item" data-shape="triangle">Tam giác</button>
                <button type="button" class="editor-menu__item" data-shape="arrow">Mũi tên</button>
              </div>
            </div>
          </div>
        </div>
      </nav>
      <div class="editor-toolbar__draw-tools">
        <div class="editor-toolbar__draw-colors">
          <label title="Màu viền / nét"><span>Viền</span><input type="color" id="editorDrawStroke" value="#ffffff" /></label>
          <label title="Độ dày nét"><span>Nét</span><input type="number" id="editorDrawStrokeWidth" min="1" max="40" value="6" /></label>
          <label class="editor-toolbar__fill-toggle" title="Bật màu nền shape"><input type="checkbox" id="editorDrawFillOn" /><span>Nền</span><input type="color" id="editorDrawFill" value="#6366f1" /></label>
        </div>
        <button type="button" id="editorSelectTool" class="btn btn--ghost btn--sm" title="Chọn layer">Select</button>
      </div>
      <input id="editorMediaInput" type="file" accept="image/*,video/*" hidden aria-hidden="true" tabindex="-1" />
      <div class="editor-toolbar__playback">
        <button type="button" id="editorPlayPause" class="btn btn--ghost btn--sm" title="Play" aria-pressed="false">▶ Play</button>
        <span id="editorTimeDisplay" class="editor-time-display">0:00 / 0:00</span>
      </div>
    </div>

    <div class="editor-main">
      <aside class="editor-panel editor-panel--layers">
        <div class="editor-panel__layers-section">
          <h3 class="editor-panel__title">Layers</h3>
          <ul id="editorLayersList" class="editor-layers-list" role="list"></ul>
          <p id="editorLayersEmpty" class="editor-panel__empty">Thêm ảnh, video, text hoặc kéo thả vào khung.</p>
        </div>
        <div class="editor-panel__history-section">
          <h3 class="editor-panel__title editor-panel__title--history">History</h3>
          <ol id="editorHistoryList" class="editor-history-list"></ol>
        </div>
      </aside>

      <div class="editor-preview-wrap">
        <div id="editorFrame" class="editor-frame editor-drop-zone" title="Kéo thả ảnh hoặc video vào khung canvas">
          <div id="editorOverlay" class="editor-frame__overlay"></div>
          <svg id="editorDrawPreview" class="editor-draw-preview" hidden></svg>
          <div id="editorBlurPreview" class="editor-draw-preview editor-draw-preview--blur" hidden></div>
          <div id="editorTransformBox" class="editor-transform-box" hidden>
            <div class="editor-transform-box__body" data-handle="drag" title="Kéo để di chuyển"></div>
            <div class="editor-transform-box__edge" data-handle="n" title="Kéo cạnh trên"></div>
            <div class="editor-transform-box__edge" data-handle="e" title="Kéo cạnh phải"></div>
            <div class="editor-transform-box__edge" data-handle="s" title="Kéo cạnh dưới"></div>
            <div class="editor-transform-box__edge" data-handle="w" title="Kéo cạnh trái"></div>
            <div class="editor-transform-box__rotate-corner" data-handle="rotate-nw" title="Xoay"></div>
            <div class="editor-transform-box__rotate-corner" data-handle="rotate-ne" title="Xoay"></div>
            <div class="editor-transform-box__rotate-corner" data-handle="rotate-se" title="Xoay"></div>
            <div class="editor-transform-box__rotate-corner" data-handle="rotate-sw" title="Xoay"></div>
            <div class="editor-transform-box__handle" data-handle="nw" title="Resize góc"></div>
            <div class="editor-transform-box__handle" data-handle="ne" title="Resize góc"></div>
            <div class="editor-transform-box__handle" data-handle="se" title="Resize góc"></div>
            <div class="editor-transform-box__handle" data-handle="sw" title="Resize góc"></div>
          </div>
        </div>
      </div>

      <aside class="editor-panel editor-panel--properties">
        <h3 class="editor-panel__title">Properties</h3>
        <div id="editorProperties" class="editor-properties">
          <p class="editor-panel__empty">Chọn một layer để chỉnh sửa.</p>
        </div>
      </aside>
    </div>

    <div class="editor-timeline-section">
      <div id="editorTimeline" class="editor-timeline">
        <div class="editor-timeline__track"></div>
        <div id="editorPlayhead" class="editor-timeline__playhead"></div>
        <div id="editorCaptionTracks" class="editor-timeline__captions"></div>
      </div>
    </div>
  </div>
</div>

<dialog id="editorExportDialog" class="editor-export-dialog">
  <h3>Export JSON</h3>
  <p class="field-hint">Mock only — chưa xử lý video thật.</p>
  <textarea id="editorExportText" class="editor-export-dialog__textarea" readonly rows="16"></textarea>
  <div class="editor-export-dialog__actions">
    <button type="button" id="editorExportCopy" class="btn btn--secondary btn--sm">Copy</button>
    <button type="button" id="editorExportClose" class="btn btn--ghost btn--sm">Đóng</button>
  </div>
</dialog>

<div id="editorToast" class="editor-toast" hidden></div>

<script src="{{asset "js/editor-frame.js"}}"></script>
<script src="{{asset "js/editor-transform.js"}}"></script>
<script src="{{asset "js/editor-draw.js"}}"></script>
<script src="{{asset "js/editor-layers.js"}}"></script>
<script src="{{asset "js/editor-captions.js"}}"></script>
<script src="{{asset "js/editor-timeline.js"}}"></script>
<script src="{{asset "js/editor-history.js"}}"></script>
<script src="{{asset "js/editor-mock.js"}}"></script>
<script>
  document.addEventListener("DOMContentLoaded", function () {
    document.body.classList.add("editor-active");
    if (window.EditorApp) window.EditorApp.init();
  });
</script>
{{end}}
