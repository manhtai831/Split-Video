services:
  split_video_service:
    build: .
    restart: always
    volumes:
      - ./data/database:/app/database
      - ./data/uploads:/app/uploads
    networks:
      card:
        ipv4_address: 172.21.0.72

networks:
  card:
    name: card
    ipam:
      config:
        - subnet: 172.21.0.0/16
